version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /var/log/ibm.log:/var/log/ibm.log
    networks:
      - soc-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - soc-net

networks:
  soc-net:
    driver: bridge
